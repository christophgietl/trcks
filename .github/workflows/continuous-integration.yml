name: CI

on:
  - push

permissions: { }

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # needed by build-backend to derive package version from Git tags
      - uses: ./.github/actions/set-up-uv
        with:
          install-and-cache-dependencies: true
      - run: uv run --no-sync mkdocs build
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4.0.0
        with:
          path: site
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # needed by build-backend to derive package version from Git tags
      - uses: ./.github/actions/set-up-uv
      - run: uv build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: package-files
          path: |
            dist/
            pyproject.toml
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # needed by build-backend to derive package version from Git tags
      - uses: ./.github/actions/set-up-uv
        with:
          install-and-cache-dependencies: true
          python-version: ${{ matrix.python-version }}
      - uses: ./.github/actions/set-up-pre-commit
        with:
          cache-key-suffix: ${{ matrix.os }}-${{ matrix.python-version }}
      - run: uv run --no-sync pre-commit run --all-files --show-diff-on-failure
      - name: Run tests and type checks with dependencies specified in uv.lock file
        uses: ./.github/actions/run-tests-and-type-checks
      - name: Run tests and type checks with lowest direct dependencies
        uses: ./.github/actions/run-tests-and-type-checks
        with:
          locked: false
          resolution-strategy: lowest-direct
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: github.ref_type == 'tag'
    needs:
      - build-docs
      - build-package
      - lint-and-test
    permissions:
      id-token: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
  publish-package:
    environment:
      name: PyPI
      url: https://pypi.org/project/trcks/
    if: github.ref_type == 'tag'
    needs:
      - publish-docs
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # needed by build-backend to derive package version from Git tags
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: package-files
      - uses: ./.github/actions/set-up-uv
      - run: uv publish
