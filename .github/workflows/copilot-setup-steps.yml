name: Copilot setup steps

on:
  # Automatically trigger the workflow on modification for testing purposes:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  workflow_dispatch:

permissions: { }

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # needed by build-backend to derive package version from Git tags
          persist-credentials: false
      - uses: christophgietl/uv-actions/set-up-uv@7b540d25e6117c0dd12adb1cb8e43223aa0b94b5 # 2026.7.21
        with:
          install-and-cache-dependencies: true
      - uses: christophgietl/uv-actions/set-up-pre-commit@7b540d25e6117c0dd12adb1cb8e43223aa0b94b5 # 2026.7.21
        with:
          cache-key-suffix: copilot-setup-steps
          install-git-hooks: true
