name: Copilot setup steps

on:
  # Automatically trigger the workflow on modification for testing purposes:
  pull_request:
    paths:
      - .github/actions/set-up-uv/action.yml
      - .github/workflows/copilot-setup-steps.yml
  push:
    paths:
      - .github/actions/set-up-uv/action.yml
      - .github/workflows/copilot-setup-steps.yml
  workflow_dispatch:

permissions: { }

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # needed by build-backend to derive package version from Git tags
          persist-credentials: false
      - uses: ./.github/actions/set-up-uv
        with:
          cache-key-suffix: copilot-setup-steps
          install-and-cache-dependencies: true
          install-git-hooks: true
          setup-pre-commit: true
